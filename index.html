<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutrition Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #f8f7f4;
  --surface:   #ffffff;
  --surface2:  #f2f1ee;
  --border:    #e8e6e1;
  --border2:   #d4d1ca;
  --text:      #1a1916;
  --muted:     #888580;
  --muted2:    #b8b5b0;
  --green:     #2d6a4f;
  --green-bg:  #eaf3ee;
  --blue:      #1a5fa8;
  --blue-bg:   #e8f1fb;
  --orange:    #b85c00;
  --orange-bg: #fdf0e3;
  --red:       #c0392b;
  --red-bg:    #fcecea;
  --teal:      #0d7377;
  --teal-bg:   #e4f4f5;
  --purple:    #5b3fb5;
  --purple-bg: #f0ecfb;
  --accent:    #2d6a4f;
  --cat-pro:   #5b3fb5; --cat-pro-bg: #f0ecfb;
  --cat-fec:   #b85c00; --cat-fec-bg: #fdf0e3;
  --cat-leg:   #2d6a4f; --cat-leg-bg: #eaf3ee;
  --cat-fru:   #c0392b; --cat-fru-bg: #fcecea;
  --cat-mid:   #1a5fa8; --cat-mid-bg: #e8f1fb;
  --cat-div:   #888580; --cat-div-bg: #f2f1ee;
  --radius-sm: 6px; --radius: 10px; --radius-lg: 16px;
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
}
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding-bottom: 120px; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.brand-title { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
.brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
.header-nav { display: flex; gap: 0.4rem; }
.nav-btn { padding: 0.4rem 0.9rem; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* LAYOUT */
.container { max-width: 1060px; margin: 0 auto; padding: 2rem; }
section { margin-bottom: 2.25rem; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-family: 'Instrument Serif', serif; font-size: 1.2rem; color: var(--text); }
.section-sub { font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

/* GOALS */
.goals-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
.goal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.85rem 1rem; }
.goal-card-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
.goal-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--muted); }
.goal-nums { font-size: 0.78rem; font-family: 'DM Mono', monospace; }
.goal-nums .cur { font-weight: 500; color: var(--text); }
.goal-nums .tot { color: var(--muted2); }
.track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.track-fill { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(.4,0,.2,1), background 0.3s; }
.pct-label { font-size: 0.68rem; color: var(--muted2); font-family: 'DM Mono', monospace; margin-top: 0.3rem; text-align: right; }

/* CAT GRID */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.65rem; }
.cat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem; cursor: pointer; transition: all 0.18s; display: flex; flex-direction: column; gap: 0.35rem; position: relative; overflow: hidden; }
.cat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--c); opacity: 0; transition: opacity 0.18s; }
.cat-card:hover { border-color: var(--c); box-shadow: var(--shadow); transform: translateY(-1px); }
.cat-card:hover::before, .cat-card.active::before { opacity: 1; }
.cat-card.active { border-color: var(--c); background: var(--cbg); box-shadow: var(--shadow); }
.cat-icon { font-size: 1.4rem; line-height: 1; }
.cat-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
.cat-count { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.cat-all { --c: var(--text); --cbg: var(--surface2); }
.cat-pro  { --c: var(--cat-pro); --cbg: var(--cat-pro-bg); }
.cat-fec  { --c: var(--cat-fec); --cbg: var(--cat-fec-bg); }
.cat-leg  { --c: var(--cat-leg); --cbg: var(--cat-leg-bg); }
.cat-fru  { --c: var(--cat-fru); --cbg: var(--cat-fru-bg); }
.cat-mid  { --c: var(--cat-mid); --cbg: var(--cat-mid-bg); }
.cat-div  { --c: var(--cat-div); --cbg: var(--cat-div-bg); }

/* TOOLBAR */
.toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted2); font-size: 0.9rem; pointer-events: none; }
.search-input { width: 100%; padding: 0.58rem 0.9rem 0.58rem 2.1rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); transition: border-color 0.15s; }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--muted2); }

/* FOOD LIST */
.food-list { display: flex; flex-direction: column; gap: 0.45rem; }
.food-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.65rem 1rem; display: grid; grid-template-columns: 1fr auto auto auto auto; align-items: center; gap: 0.75rem; transition: border-color 0.15s, box-shadow 0.15s; }
.food-row:hover { border-color: var(--border2); box-shadow: var(--shadow); }
.food-info { display: flex; flex-direction: column; gap: 0.22rem; min-width: 0; }
.food-name { font-size: 0.88rem; font-weight: 500; color: var(--text); }
.food-tags { display: flex; gap: 0.28rem; flex-wrap: wrap; }
.tag { font-size: 0.66rem; font-family: 'DM Mono', monospace; padding: 0.13rem 0.38rem; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.tag-kcal { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.tag-p { background: var(--cat-pro-bg); color: var(--cat-pro); }
.tag-g { background: var(--blue-bg); color: var(--blue); }
.tag-l { background: var(--orange-bg); color: var(--orange); }
.tag-f { background: var(--teal-bg); color: var(--teal); }

.qty-wrap { display: flex; align-items: center; gap: 0.3rem; }
.qty-input { width: 52px; padding: 0.32rem 0.35rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 0.82rem; text-align: center; color: var(--text); background: var(--surface2); transition: border-color 0.15s; }
.qty-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.qty-unit { font-size: 0.7rem; color: var(--muted); }
.qty-preview { font-size: 0.74rem; font-family: 'DM Mono', monospace; color: var(--muted); min-width: 58px; text-align: right; }
.meal-sel { padding: 0.33rem 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--text); background: var(--surface2); cursor: pointer; }
.meal-sel:focus { outline: none; border-color: var(--accent); }
.btn-add { padding: 0.35rem 0.8rem; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
.btn-add:hover { opacity: 0.85; }
.btn-add:active { transform: scale(0.97); }
.no-result { text-align: center; padding: 2.5rem 1rem; color: var(--muted2); font-size: 0.88rem; }

/* ADD FORM */
.add-food-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
.form-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 0.6rem; align-items: end; margin-bottom: 0.75rem; }
.form-group { display: flex; flex-direction: column; gap: 0.28rem; }
.form-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
.form-input { padding: 0.5rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); background: var(--surface2); transition: border-color 0.15s; width: 100%; }
.form-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.form-select { padding: 0.5rem 0.6rem; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); background: var(--surface2); cursor: pointer; width: 100%; }
.form-select:focus { outline: none; border-color: var(--accent); }
.form-actions { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
.btn-save { padding: 0.5rem 1.2rem; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-save:hover { opacity: 0.82; }
.btn-cancel { padding: 0.5rem 1rem; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer; }
.btn-cancel:hover { background: var(--surface2); }
.form-err { font-size: 0.78rem; color: var(--red); margin-top: 0.4rem; min-height: 1rem; }

/* MEAL LOG */
.meal-tabs { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
.meal-tab { padding: 0.32rem 0.85rem; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.meal-tab:hover { border-color: var(--border2); color: var(--text); }
.meal-tab.active { background: var(--text); color: #fff; border-color: var(--text); }
.meal-group { margin-bottom: 1.25rem; }
.meal-group-header { display: flex; align-items: center; justify-content: space-between; padding: 0.45rem 0; margin-bottom: 0.35rem; border-bottom: 1px solid var(--border); }
.meal-group-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; color: var(--muted); font-family: 'DM Mono', monospace; }
.meal-group-total { font-size: 0.76rem; font-family: 'DM Mono', monospace; color: var(--text); font-weight: 500; }
.log-row { display: grid; grid-template-columns: 1fr auto auto auto auto; align-items: center; gap: 0.75rem; padding: 0.48rem 0.7rem; border-radius: var(--radius-sm); transition: background 0.12s; }
.log-row:hover { background: var(--surface2); }
.log-name { font-size: 0.85rem; color: var(--text); }
.log-qty { font-size: 0.74rem; color: var(--muted); font-family: 'DM Mono', monospace; }
.log-macros { display: flex; gap: 0.28rem; }
.log-kcal { font-size: 0.82rem; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); min-width: 52px; text-align: right; }
.btn-rm { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 0.8rem; width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: color 0.15s, background 0.15s; }
.btn-rm:hover { color: var(--red); background: var(--red-bg); }
.log-empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted2); font-size: 0.85rem; border: 1px dashed var(--border2); border-radius: var(--radius-lg); }
.log-empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }

/* FLOAT BAR */
.float-bar { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: #fff; border-radius: 100px; padding: 0.7rem 1.4rem; display: flex; align-items: center; gap: 1.1rem; box-shadow: var(--shadow-lg); z-index: 100; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; white-space: nowrap; transition: opacity 0.25s, transform 0.25s; }
.float-bar.hidden { opacity: 0; transform: translateX(-50%) translateY(14px); pointer-events: none; }
.float-kcal { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; }
.float-kcal span { opacity: 0.45; font-size: 0.76rem; margin-left: 2px; }
.float-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.15); }
.float-macro { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.float-macro-val { font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; }
.float-macro-lbl { font-size: 0.6rem; opacity: 0.45; text-transform: uppercase; letter-spacing: 0.07em; }
.float-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; border-radius: 20px; padding: 0.22rem 0.65rem; font-size: 0.74rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; white-space: nowrap; }
.float-btn:hover { background: rgba(255,255,255,0.2); }

/* TOAST */
.toast { position: fixed; top: 5rem; right: 1.5rem; background: var(--text); color: #fff; padding: 0.52rem 0.9rem; border-radius: var(--radius); font-size: 0.8rem; z-index: 200; opacity: 0; transform: translateY(-6px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; font-family: 'DM Mono', monospace; }
.toast.show { opacity: 1; transform: translateY(0); }

/* PAGE ROUTING */
.page { display: none; }
.page.active { display: block; }

/* CUSTOM ROW */
.custom-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.65rem 1rem; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 0.75rem; }
.btn-delete { padding: 0.28rem 0.6rem; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--red); font-family: 'DM Sans', sans-serif; font-size: 0.76rem; cursor: pointer; }
.btn-delete:hover { background: var(--red-bg); border-color: var(--red); }

@media (max-width: 700px) {
  .container { padding: 1rem; }
  .header { padding: 0.75rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
  .goals-grid { grid-template-columns: repeat(2,1fr); }
  .food-row { grid-template-columns: 1fr; gap: 0.5rem; }
  .form-grid { grid-template-columns: 1fr 1fr; }
  .float-bar { width: calc(100% - 2rem); left: 1rem; transform: none; border-radius: var(--radius-lg); justify-content: center; flex-wrap: wrap; gap: 0.75rem; }
  .float-bar.hidden { transform: translateY(14px); }
}
</style>
</head>
<body>

<header class="header">
  <div class="brand-title"><span class="brand-dot"></span> Nutrition</div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showPage('catalogue')">Catalogue</button>
    <button class="nav-btn" onclick="showPage('journal')">Journal du jour</button>
    <button class="nav-btn" onclick="showPage('ajouter')">+ Ajouter un aliment</button>
  </nav>
</header>

<div class="container">

  <!-- PAGE CATALOGUE -->
  <div class="page active" id="page-catalogue">
    <section>
      <div class="section-head">
        <div class="section-title">Objectifs du jour</div>
      </div>
      <div class="goals-grid" id="goals-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <div class="section-title">Catégories</div>
        <div class="section-sub" id="food-count"></div>
      </div>
      <div class="cat-grid" id="cat-grid"></div>
    </section>

    <section>
      <div class="section-head">
        <div class="section-title" id="list-title">Tous les aliments</div>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input type="text" class="search-input" id="search" placeholder="Rechercher un aliment…" oninput="renderFoodList()">
        </div>
      </div>
      <div class="food-list" id="food-list"></div>
    </section>
  </div>

  <!-- PAGE JOURNAL -->
  <div class="page" id="page-journal">
    <section>
      <div class="section-head">
        <div class="section-title">Journal du jour</div>
        <button class="btn-cancel" style="font-size:0.78rem" onclick="clearAll()">Tout vider</button>
      </div>
      <div class="meal-tabs" id="meal-filter-tabs"></div>
      <div id="meal-log"></div>
    </section>
  </div>

  <!-- PAGE AJOUTER -->
  <div class="page" id="page-ajouter">
    <section>
      <div class="section-head">
        <div class="section-title">Nouvel aliment</div>
      </div>
      <div class="add-food-box">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input class="form-input" type="text" id="f-name" placeholder="ex: Lait entier (200ml)">
          </div>
          <div class="form-group">
            <label class="form-label">Calories</label>
            <input class="form-input" type="number" id="f-kcal" placeholder="0" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Protéines (g)</label>
            <input class="form-input" type="number" id="f-pro" placeholder="0" min="0" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Glucides (g)</label>
            <input class="form-input" type="number" id="f-glu" placeholder="0" min="0" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Lipides (g)</label>
            <input class="form-input" type="number" id="f-lip" placeholder="0" min="0" step="0.1">
          </div>
          <div class="form-group">
            <label class="form-label">Fibres (g)</label>
            <input class="form-input" type="number" id="f-fib" placeholder="0" min="0" step="0.1">
          </div>
        </div>
        <div class="form-group" style="max-width:200px;margin-bottom:0.75rem">
          <label class="form-label">Catégorie</label>
          <select class="form-select" id="f-cat">
            <option value="Protéines">Protéines</option>
            <option value="Féculents">Féculents</option>
            <option value="Légumes">Légumes</option>
            <option value="Fruits">Fruits</option>
            <option value="Midi">Midi</option>
            <option value="Divers">Divers</option>
          </select>
        </div>
        <div class="form-err" id="form-err"></div>
        <div class="form-actions">
          <button class="btn-save" onclick="saveFood()">Enregistrer</button>
          <button class="btn-cancel" onclick="clearForm()">Effacer</button>
        </div>
      </div>

      <div style="margin-top:2rem">
        <div class="section-head">
          <div class="section-title" style="font-size:1rem">Aliments ajoutés</div>
        </div>
        <div class="food-list" id="custom-list">
          <div class="no-result">Aucun aliment ajouté pour l'instant</div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- FLOATING BAR -->
<div class="float-bar hidden" id="float-bar">
  <div class="float-kcal" id="fb-kcal">0 <span>kcal</span></div>
  <div class="float-sep"></div>
  <div class="float-macro"><div class="float-macro-val" id="fb-pro">0g</div><div class="float-macro-lbl">Prot.</div></div>
  <div class="float-macro"><div class="float-macro-val" id="fb-glu">0g</div><div class="float-macro-lbl">Gluc.</div></div>
  <div class="float-macro"><div class="float-macro-val" id="fb-lip">0g</div><div class="float-macro-lbl">Lip.</div></div>
  <div class="float-macro"><div class="float-macro-val" id="fb-fib">0g</div><div class="float-macro-lbl">Fib.</div></div>
  <div class="float-sep"></div>
  <button class="float-btn" onclick="showPage('journal')">Journal →</button>
  <button class="float-btn" onclick="clearAll()">Vider</button>
</div>

<div class="toast" id="toast"></div>

<script>
const GOALS = { kcal: 2000, pro: 140, glu: 190, lip: 70 };
const CAT_META = {
  'Tout':      { icon: '◈',  cls: 'cat-all' },
  'Protéines': { icon: '🥩', cls: 'cat-pro' },
  'Féculents': { icon: '🌾', cls: 'cat-fec' },
  'Légumes':   { icon: '🥦', cls: 'cat-leg' },
  'Fruits':    { icon: '🍎', cls: 'cat-fru' },
  'Midi':      { icon: '🍱', cls: 'cat-mid' },
  'Divers':    { icon: '🧂', cls: 'cat-div' },
};
const MEALS = ['Petit-déjeuner', 'Déjeuner', 'Dîner', 'Collation'];

let customFoods = JSON.parse(localStorage.getItem('nt-custom') || '[]');
let FOODS = [...BASE_FOODS, ...customFoods];
let mealLog = JSON.parse(localStorage.getItem('nt-log') || '[]');
let activeCat = 'Tout';
let activeMealFilter = 'Tout';

// PAGE NAV
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const map = { catalogue: 0, journal: 1, ajouter: 2 };
  document.querySelectorAll('.nav-btn')[map[id]]?.classList.add('active');
  if (id === 'journal') renderMealLog();
  if (id === 'ajouter') renderCustomList();
}

// GOALS
function buildGoals() {
  const t = getTotals();
  const defs = [
    {label:'Calories', unit:'kcal', val:t.kcal, goal:GOALS.kcal, color:'var(--accent)'},
    {label:'Protéines', unit:'g',   val:t.pro,  goal:GOALS.pro,  color:'var(--cat-pro)'},
    {label:'Glucides',  unit:'g',   val:t.glu,  goal:GOALS.glu,  color:'var(--blue)'},
    {label:'Lipides',   unit:'g',   val:t.lip,  goal:GOALS.lip,  color:'var(--orange)'},
  ];
  document.getElementById('goals-grid').innerHTML = defs.map(d => {
    const pct = Math.min(100, Math.round(d.val / d.goal * 100));
    const fillColor = pct >= 100 ? 'var(--red)' : pct >= 85 ? 'var(--orange)' : d.color;
    return `<div class="goal-card">
      <div class="goal-card-top">
        <span class="goal-label">${d.label}</span>
        <span class="goal-nums"><span class="cur">${Math.round(d.val)}${d.unit}</span> <span class="tot">/ ${d.goal}${d.unit}</span></span>
      </div>
      <div class="track"><div class="track-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="pct-label">${pct}%${pct >= 100 ? ' ⚠ dépassé' : ''}</div>
    </div>`;
  }).join('');
}

// CAT GRID
function buildCatGrid() {
  const cats = ['Tout', ...new Set(FOODS.map(f => f.cat))];
  document.getElementById('cat-grid').innerHTML = cats.map(c => {
    const meta = CAT_META[c] || {icon:'•', cls:'cat-div'};
    const count = c === 'Tout' ? FOODS.length : FOODS.filter(f => f.cat === c).length;
    return `<div class="cat-card ${meta.cls}${activeCat === c ? ' active' : ''}" onclick="selectCat('${c}')">
      <span class="cat-icon">${meta.icon}</span>
      <div class="cat-name">${c}</div>
      <div class="cat-count">${count} aliment${count > 1 ? 's' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('food-count').textContent = FOODS.length + ' aliments au total';
}

function selectCat(c) {
  activeCat = c;
  document.getElementById('search').value = '';
  document.getElementById('list-title').textContent = c === 'Tout' ? 'Tous les aliments' : c;
  buildCatGrid();
  renderFoodList();
}

// FOOD LIST
function renderFoodList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = FOODS.filter(f =>
    (activeCat === 'Tout' || f.cat === activeCat) && f.name.toLowerCase().includes(q)
  );
  const el = document.getElementById('food-list');
  if (!filtered.length) { el.innerHTML = '<div class="no-result">Aucun aliment trouvé</div>'; return; }
  el.innerHTML = filtered.map(f => {
    const idx = FOODS.indexOf(f);
    return `<div class="food-row">
      <div class="food-info">
        <div class="food-name">${f.name}</div>
        <div class="food-tags">
          <span class="tag tag-kcal">${f.kcal} kcal</span>
          <span class="tag tag-p">P ${f.pro}g</span>
          <span class="tag tag-g">G ${f.glu}g</span>
          <span class="tag tag-l">L ${f.lip}g</span>
          <span class="tag tag-f">F ${f.fib}g</span>
        </div>
      </div>
      <div class="qty-wrap">
        <input class="qty-input" type="number" id="qty_${idx}" value="1" min="0.5" max="20" step="0.5" oninput="updatePreview(${idx})">
        <span class="qty-unit">×</span>
      </div>
      <span class="qty-preview" id="prev_${idx}">${f.kcal} kcal</span>
      <select class="meal-sel" id="msel_${idx}">
        ${MEALS.map(m => `<option value="${m}"${m==='Déjeuner'?' selected':''}>${m}</option>`).join('')}
      </select>
      <button class="btn-add" onclick="addToLog(${idx})">Ajouter</button>
    </div>`;
  }).join('');
}

function updatePreview(idx) {
  const f = FOODS[idx];
  const qty = parseFloat(document.getElementById('qty_'+idx)?.value) || 1;
  const el = document.getElementById('prev_'+idx);
  if (el) el.textContent = Math.round(f.kcal * qty) + ' kcal';
}

// MEAL LOG
function addToLog(idx) {
  const f = FOODS[idx];
  const qty = parseFloat(document.getElementById('qty_'+idx)?.value) || 1;
  const mealName = document.getElementById('msel_'+idx)?.value || 'Déjeuner';
  mealLog.push({ id: Date.now()+Math.random(), foodName:f.name, qty, mealName,
    kcal:f.kcal*qty, pro:f.pro*qty, glu:f.glu*qty, lip:f.lip*qty, fib:f.fib*qty });
  saveMealLog(); buildGoals(); updateFloatBar();
  showToast('✓ ' + f.name + ' ajouté');
}

function removeFromLog(id) {
  mealLog = mealLog.filter(i => i.id !== id);
  saveMealLog(); buildGoals(); updateFloatBar(); renderMealLog();
}

function clearAll() {
  if (!mealLog.length) return;
  mealLog = []; saveMealLog(); buildGoals(); updateFloatBar(); renderMealLog();
  showToast('Journal vidé');
}

function saveMealLog() { localStorage.setItem('nt-log', JSON.stringify(mealLog)); }

function renderMealLog() {
  buildMealFilterTabs();
  const el = document.getElementById('meal-log');
  if (!mealLog.length) {
    el.innerHTML = '<div class="log-empty"><span class="log-empty-icon">🍽</span>Aucun aliment enregistré aujourd\'hui</div>'; return;
  }
  const usedMeals = MEALS.filter(m => mealLog.some(i => i.mealName === m));
  const toShow = activeMealFilter === 'Tout' ? usedMeals : usedMeals.filter(m => m === activeMealFilter);
  if (!toShow.length) {
    el.innerHTML = '<div class="log-empty"><span class="log-empty-icon">🍽</span>Aucun aliment pour ce repas</div>'; return;
  }
  el.innerHTML = toShow.map(mName => {
    const items = mealLog.filter(i => i.mealName === mName);
    const mKcal = items.reduce((s,i)=>s+i.kcal,0);
    const mPro  = items.reduce((s,i)=>s+i.pro,0);
    const mGlu  = items.reduce((s,i)=>s+i.glu,0);
    const mLip  = items.reduce((s,i)=>s+i.lip,0);
    return `<div class="meal-group">
      <div class="meal-group-header">
        <span class="meal-group-name">${mName}</span>
        <span class="meal-group-total">${Math.round(mKcal)} kcal · P ${Math.round(mPro)}g · G ${Math.round(mGlu)}g · L ${Math.round(mLip)}g</span>
      </div>
      ${items.map(i=>`<div class="log-row">
        <span class="log-name">${i.foodName}</span>
        <span class="log-qty">×${i.qty}</span>
        <div class="log-macros">
          <span class="tag tag-p">P ${Math.round(i.pro)}g</span>
          <span class="tag tag-g">G ${Math.round(i.glu)}g</span>
          <span class="tag tag-l">L ${Math.round(i.lip)}g</span>
        </div>
        <span class="log-kcal">${Math.round(i.kcal)} kcal</span>
        <button class="btn-rm" onclick="removeFromLog(${i.id})">✕</button>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function buildMealFilterTabs() {
  const usedMeals = MEALS.filter(m => mealLog.some(i => i.mealName === m));
  const tabs = ['Tout', ...usedMeals];
  document.getElementById('meal-filter-tabs').innerHTML = tabs.map(m =>
    `<button class="meal-tab${activeMealFilter===m?' active':''}" onclick="setMealFilter('${m}')">${m}</button>`
  ).join('');
}

function setMealFilter(m) { activeMealFilter = m; renderMealLog(); }

// FLOAT BAR
function getTotals() {
  return mealLog.reduce((s,i)=>({kcal:s.kcal+i.kcal,pro:s.pro+i.pro,glu:s.glu+i.glu,lip:s.lip+i.lip,fib:s.fib+i.fib}),
    {kcal:0,pro:0,glu:0,lip:0,fib:0});
}

function updateFloatBar() {
  const t = getTotals();
  document.getElementById('fb-kcal').innerHTML = Math.round(t.kcal) + ' <span>kcal</span>';
  document.getElementById('fb-pro').textContent = Math.round(t.pro)+'g';
  document.getElementById('fb-glu').textContent = Math.round(t.glu)+'g';
  document.getElementById('fb-lip').textContent = Math.round(t.lip)+'g';
  document.getElementById('fb-fib').textContent = Math.round(t.fib)+'g';
  document.getElementById('float-bar').classList.toggle('hidden', mealLog.length === 0);
}

// ADD FOOD
function saveFood() {
  const name = document.getElementById('f-name').value.trim();
  const kcal = parseFloat(document.getElementById('f-kcal').value);
  const pro  = parseFloat(document.getElementById('f-pro').value)||0;
  const glu  = parseFloat(document.getElementById('f-glu').value)||0;
  const lip  = parseFloat(document.getElementById('f-lip').value)||0;
  const fib  = parseFloat(document.getElementById('f-fib').value)||0;
  const cat  = document.getElementById('f-cat').value;
  const err  = document.getElementById('form-err');
  if (!name) { err.textContent='Le nom est obligatoire.'; return; }
  if (isNaN(kcal)||kcal<0) { err.textContent='Renseigne un nombre de calories valide.'; return; }
  err.textContent='';
  const food = {cat,name,kcal,pro,glu,lip,fib,custom:true};
  customFoods.push(food);
  FOODS = [...BASE_FOODS, ...customFoods];
  localStorage.setItem('nt-custom', JSON.stringify(customFoods));
  clearForm(); buildCatGrid(); renderFoodList(); renderCustomList();
  showToast('✓ "'+name+'" ajouté à la base');
}

function clearForm() {
  ['f-name','f-kcal','f-pro','f-glu','f-lip','f-fib'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('form-err').textContent='';
}

function renderCustomList() {
  const el = document.getElementById('custom-list');
  if (!customFoods.length) { el.innerHTML='<div class="no-result">Aucun aliment ajouté pour l\'instant</div>'; return; }
  el.innerHTML = customFoods.map((f,i)=>`
    <div class="custom-row">
      <div class="food-info">
        <div class="food-name">${f.name} <span style="font-size:0.7rem;color:var(--muted2);margin-left:4px">${f.cat}</span></div>
        <div class="food-tags">
          <span class="tag tag-kcal">${f.kcal} kcal</span>
          <span class="tag tag-p">P ${f.pro}g</span>
          <span class="tag tag-g">G ${f.glu}g</span>
          <span class="tag tag-l">L ${f.lip}g</span>
          <span class="tag tag-f">F ${f.fib}g</span>
        </div>
      </div>
      <button class="btn-delete" onclick="deleteCustom(${i})">Supprimer</button>
    </div>`).join('');
}

function deleteCustom(i) {
  const name = customFoods[i].name;
  customFoods.splice(i,1);
  FOODS = [...BASE_FOODS, ...customFoods];
  localStorage.setItem('nt-custom', JSON.stringify(customFoods));
  buildCatGrid(); renderFoodList(); renderCustomList();
  showToast('"'+name+'" supprimé');
}

// TOAST
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'), 2200);
}

// INIT
buildCatGrid(); renderFoodList(); buildGoals(); updateFloatBar();
</script>
